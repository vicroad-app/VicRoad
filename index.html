    (function() {
      var storageKey = "vr_motion_permission";
      var remembered = localStorage.getItem(storageKey);
      var params = new URLSearchParams(window.location.search);
      var setupMode = params.get("motionSetup") === "1";

      var orientationAPI = window.DeviceOrientationEvent;
      var motionAPI = window.DeviceMotionEvent;
      var hasOrientationPermissionAPI = orientationAPI && typeof orientationAPI.requestPermission === "function";
      var hasMotionPermissionAPI = motionAPI && typeof motionAPI.requestPermission === "function";

      if (!hasOrientationPermissionAPI && !hasMotionPermissionAPI) {
        return;
      }

      var nativeOrientationPermission = hasOrientationPermissionAPI
        ? orientationAPI.requestPermission.bind(orientationAPI)
        : null;
      var nativeMotionPermission = hasMotionPermissionAPI
        ? motionAPI.requestPermission.bind(motionAPI)
        : null;
      var allowPromptThisTap = false;

      function guardedPermissionRequest(nativeFn) {
        if (!nativeFn) return Promise.resolve("granted");
        if (remembered === "granted") {
          return Promise.resolve("granted");
        }
        if (!setupMode) {
          return Promise.resolve("denied");
        }
        if (!allowPromptThisTap) {
          return Promise.resolve("denied");
        }
        allowPromptThisTap = false;
        return nativeFn().then(function(state) {
          if (state === "granted") {
            remembered = "granted";
            localStorage.setItem(storageKey, "granted");
            var btn = document.getElementById("enable-motion-btn");
            if (btn) btn.remove();
          }
          return state;
        });
      }

      if (hasOrientationPermissionAPI) {
        orientationAPI.requestPermission = function() {
          return guardedPermissionRequest(nativeOrientationPermission);
        };
      }
      if (hasMotionPermissionAPI) {
        motionAPI.requestPermission = function() {
          return guardedPermissionRequest(nativeMotionPermission);
        };
      }

      if (remembered === "granted" || !setupMode) {
        return;
      }

      function createButton() {
        if (document.getElementById("enable-motion-btn")) return;
        var btn = document.createElement("button");
        btn.id = "enable-motion-btn";
        btn.type = "button";
        btn.textContent = "Enable Motion";
        btn.style.position = "fixed";
        btn.style.right = "12px";
        btn.style.bottom = "12px";
        btn.style.zIndex = "9999";
        btn.style.padding = "10px 12px";
        btn.style.borderRadius = "10px";
        btn.style.border = "1px solid rgba(255,255,255,.35)";
        btn.style.background = "rgba(16,24,32,.82)";
        btn.style.color = "#fff";
        btn.style.fontSize = "12px";
        btn.style.fontWeight = "600";
        btn.style.backdropFilter = "blur(4px)";
        btn.style.cursor = "pointer";
        btn.title = "One-time motion permission setup";
        btn.addEventListener("click", function() {
          allowPromptThisTap = true;
          Promise.resolve()
            .then(function() {
              return hasOrientationPermissionAPI
                ? orientationAPI.requestPermission()
                : "granted";
            })
            .then(function(state) {
              if (state !== "granted") return state;
              return hasMotionPermissionAPI
                ? motionAPI.requestPermission()
                : "granted";
            })
            .catch(function() {});
        });
        document.body.appendChild(btn);
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", createButton, { once: true });
      } else {
        createButton();
      }
    })();
  </script>
