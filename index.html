  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var profileId = params.get("id");
      if (!profileId) return;

      var profileUrl = "./profiles/" + encodeURIComponent(profileId) + ".json";
      var defaultTargetFilename = "b83abeb89_IMG_6942.jpg";

      function normalizeUrl(url) {
        try {
          return new URL(url, window.location.href).toString();
        } catch (_) {
          return url;
        }
      }

      function getReplacements(profile) {
        var replacements = {};

        if (profile && profile.replacements && typeof profile.replacements === "object") {
          Object.keys(profile.replacements).forEach(function(key) {
            replacements[key] = normalizeUrl(profile.replacements[key]);
          });
        }

        if (profile && (profile.licence_photo_url || profile.photo_url || profile.image_url)) {
          var photoUrl = profile.licence_photo_url || profile.photo_url || profile.image_url;
          var target = profile.target_filename || defaultTargetFilename;
          replacements[target] = normalizeUrl(photoUrl);
        }

        if (profile && profile.logo_url) {
          replacements["469154745_outline.png"] = normalizeUrl(profile.logo_url);
        }

        if (profile && profile.nav_icon_url) {
          replacements["29b561457_IMG_6936-removebg-preview1.png"] = normalizeUrl(profile.nav_icon_url);
        }

        return replacements;
      }

      function applySelectorPhoto(profile) {
        if (!profile) return;

        var selector = profile.paste_selector || profile.target_selector;
        if (!selector) return;

        var url = profile.paste_photo_url || profile.licence_photo_url || profile.photo_url || profile.image_url;
        if (!url) return;

        var nodes = document.querySelectorAll(selector);
        if (!nodes || nodes.length === 0) return;

        var index = typeof profile.paste_index === "number" ? profile.paste_index : 0;
        if (index < 0) index = 0;
        if (index >= nodes.length) index = nodes.length - 1;

        var el = nodes[index];
        if (!el) return;

        if (el.tagName === "IMG") {
          el.src = normalizeUrl(url);
          return;
        }

        if (el.getAttribute("data-profile-photo-applied") === "1") return;

        var img = document.createElement("img");
        img.src = normalizeUrl(url);
        img.alt = "profile";
        img.style.width = "100%";
        img.style.height = "100%";
        img.style.objectFit = "cover";
        img.style.display = "block";
        img.style.borderRadius = "inherit";

        el.innerHTML = "";
        el.style.overflow = "hidden";
        el.appendChild(img);
        el.setAttribute("data-profile-photo-applied", "1");
      }

      function applyProfile(profile) {
        var replacements = getReplacements(profile);

        function rewriteImage(img) {
          if (!img || !img.src) return;
          Object.keys(replacements).forEach(function(filename) {
            if (img.src.indexOf(filename) !== -1) {
              img.src = replacements[filename];

          });

        if (Object.keys(replacements).length > 0) {
          document.querySelectorAll("img").forEach(rewriteImage);
        }

              if (node.tagName === "IMG") rewriteImage(node);
              if (node.querySelectorAll) node.querySelectorAll("img").forEach(rewriteImage);
              applySelectorPhoto(profile);
            });
          });
        });
        observer.observe(document.body, { childList: true, subtree: true });
      }

        .then(function(res) { return res.ok ? res.json() : null; })
